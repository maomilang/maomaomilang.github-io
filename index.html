<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風險管理基本能力測驗 · 第20屆</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2330;
    --border: #2a3040;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --gold: #f5c842;
    --green: #3ecf8e;
    --red: #f56565;
    --text: #e8eaf0;
    --text2: #8b92a8;
    --text3: #5a6175;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(79,142,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(124,92,252,0.07) 0%, transparent 60%);
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,20,0.92);
  }
  .logo {
    font-size: 13px;
    color: var(--text2);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }
  .logo span { color: var(--accent); }
  .header-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text3);
    display: flex;
    gap: 24px;
  }
  .header-meta b { color: var(--gold); }

  /* ── PROGRESS ── */
  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    position: sticky;
    top: 57px;
    z-index: 99;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
  }

  /* ── MAIN LAYOUT ── */
  main { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }

  /* ── SCREEN: INTRO ── */
  #screen-intro {
    text-align: center;
    padding: 60px 0;
  }
  .intro-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 5px 16px;
    margin-bottom: 28px;
    opacity: 0.85;
  }
  .intro-title {
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--text) 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .intro-sub {
    color: var(--text2);
    font-size: 15px;
    margin-bottom: 40px;
    line-height: 1.7;
  }
  .intro-stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 48px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 28px;
    text-align: center;
    min-width: 130px;
  }
  .stat-card .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--gold);
  }
  .stat-card .lbl { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .btn-start {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    padding: 16px 48px;
    border-radius: 40px;
    font-size: 17px;
    font-family: 'Noto Serif TC', serif;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 8px 32px rgba(79,142,247,0.3);
  }
  .btn-start:hover { opacity: 0.9; transform: translateY(-2px); }

  /* ── QUESTION CARD ── */
  #screen-quiz { display: none; }
  .q-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 1px;
  }
  .q-part-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid;
  }
  .part1 { color: var(--accent); border-color: var(--accent); }
  .part2 { color: var(--gold); border-color: var(--gold); }
  .q-score-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    margin-left: auto;
  }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 24px;
    line-height: 1.8;
    font-size: 16px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .options { display: flex; flex-direction: column; gap: 12px; }
  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s, transform 0.1s;
    text-align: left;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
    animation: slideIn 0.3s ease both;
  }
  .opt-btn:nth-child(1) { animation-delay: 0.05s; }
  .opt-btn:nth-child(2) { animation-delay: 0.10s; }
  .opt-btn:nth-child(3) { animation-delay: 0.15s; }
  .opt-btn:nth-child(4) { animation-delay: 0.20s; }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(79,142,247,0.07);
    transform: translateX(4px);
  }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct {
    border-color: var(--green);
    background: rgba(62,207,142,0.1);
  }
  .opt-btn.wrong {
    border-color: var(--red);
    background: rgba(245,101,101,0.08);
  }
  .opt-circle {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    margin-top: 1px;
  }
  .opt-btn.correct .opt-circle {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }
  .opt-btn.wrong .opt-circle {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  /* ── FEEDBACK ── */
  .feedback-box {
    border-radius: 12px;
    padding: 16px 20px;
    margin-top: 20px;
    font-size: 14px;
    display: none;
    animation: slideIn 0.25s ease;
    line-height: 1.7;
  }
  .feedback-box.show { display: block; }
  .feedback-correct {
    background: rgba(62,207,142,0.1);
    border: 1px solid var(--green);
    color: var(--green);
  }
  .feedback-wrong {
    background: rgba(245,101,101,0.08);
    border: 1px solid var(--red);
    color: #fc9090;
  }

  /* ── NAV BUTTONS ── */
  .nav-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    justify-content: flex-end;
  }
  .btn-nav {
    padding: 12px 28px;
    border-radius: 30px;
    border: 1px solid var(--border);
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-next {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    box-shadow: 0 4px 16px rgba(79,142,247,0.25);
    display: none;
  }
  .btn-next.show { display: block; }
  .btn-next:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-skip {
    background: transparent;
    color: var(--text3);
  }
  .btn-skip:hover { color: var(--text2); border-color: var(--text3); }

  /* ── SCREEN: RESULT ── */
  #screen-result { display: none; text-align: center; padding: 48px 0; animation: slideIn 0.4s ease; }
  .result-circle {
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 3px solid;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 36px;
    font-family: 'JetBrains Mono', monospace;
  }
  .result-score { font-size: 40px; font-weight: 600; }
  .result-max { font-size: 13px; opacity: 0.7; margin-top: 2px; }
  .pass { border-color: var(--green); color: var(--green); }
  .fail { border-color: var(--red); color: var(--red); }
  .result-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
  .result-sub { color: var(--text2); font-size: 15px; margin-bottom: 40px; }
  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .result-card .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .result-card .lbl { font-size: 12px; color: var(--text3); }
  .btn-retry {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    padding: 15px 44px;
    border-radius: 40px;
    font-size: 16px;
    font-family: 'Noto Serif TC', serif;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(79,142,247,0.28);
    transition: opacity 0.2s, transform 0.15s;
    margin: 0 8px;
  }
  .btn-retry:hover { opacity: 0.9; transform: translateY(-2px); }
  .btn-review {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    padding: 15px 44px;
    border-radius: 40px;
    font-size: 16px;
    font-family: 'Noto Serif TC', serif;
    cursor: pointer;
    transition: all 0.18s;
    margin: 0 8px;
  }
  .btn-review:hover { border-color: var(--text2); color: var(--text); }

  /* ── REVIEW MODE ── */
  #screen-review { display: none; }
  .review-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .review-item .r-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px; font-size: 13px;
  }
  .r-correct-badge {
    padding: 3px 10px; border-radius: 20px; font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }
  .r-correct-badge.ok { background: rgba(62,207,142,0.15); color: var(--green); }
  .r-correct-badge.no { background: rgba(245,101,101,0.12); color: var(--red); }
  .review-q { font-size: 15px; line-height: 1.8; margin-bottom: 14px; }
  .review-opts { font-size: 14px; line-height: 1.9; }
  .review-opts .opt-line { display: flex; gap: 10px; align-items: flex-start; padding: 6px 0; }
  .review-opts .opt-line.correct-ans { color: var(--green); font-weight: 600; }
  .review-opts .opt-line.user-wrong { color: var(--red); }
  .review-opts .opt-line.neutral { color: var(--text2); }
  .review-back {
    text-align: center; margin-top: 24px;
  }

  @media (max-width: 520px) {
    main { padding: 24px 14px 60px; }
    .q-card { padding: 20px; }
    .opt-btn { font-size: 14px; }
    header { padding: 14px 16px; }
    .header-meta { gap: 14px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">台灣金融研訓院 · <span>第20屆</span></div>
  <div class="header-meta">
    <span>題號 <b id="h-qnum">—</b>/60</span>
    <span>得分 <b id="h-score">—</b></span>
  </div>
</header>
<div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

<main>

<!-- INTRO -->
<div id="screen-intro">
  <div class="intro-badge">風險管理基本能力測驗</div>
  <h1 class="intro-title">風險管理制度與實務<br>互動刷題</h1>
  <p class="intro-sub">題目順序與選項順序全部隨機排列<br>答對立即顯示解析，完成後可查看詳細回顧</p>
  <div class="intro-stats">
    <div class="stat-card"><div class="val">60</div><div class="lbl">總題數</div></div>
    <div class="stat-card"><div class="val">100</div><div class="lbl">滿分</div></div>
    <div class="stat-card"><div class="val">1.5 / 2</div><div class="lbl">每題配分</div></div>
    <div class="stat-card"><div class="val">60</div><div class="lbl">及格分數</div></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">開始測驗</button>
</div>

<!-- QUIZ -->
<div id="screen-quiz">
  <div class="q-meta">
    <span class="q-num" id="q-num-label">題目 1 / 60</span>
    <span class="q-part-tag" id="q-part-tag">第一部分</span>
    <span class="q-score-tag" id="q-score-tag">每題 1.5 分</span>
  </div>
  <div class="q-card" id="q-card"></div>
  <div class="options" id="options-wrap"></div>
  <div class="feedback-box" id="feedback-box"></div>
  <div class="nav-row">
    <button class="btn-nav btn-skip" onclick="skipQuestion()">跳過此題</button>
    <button class="btn-nav btn-next" id="btn-next" onclick="nextQuestion()">下一題 →</button>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result">
  <div class="result-circle" id="result-circle">
    <div class="result-score" id="result-score"></div>
    <div class="result-max">/ 100 分</div>
  </div>
  <h2 class="result-title" id="result-title"></h2>
  <p class="result-sub" id="result-sub"></p>
  <div class="result-grid">
    <div class="result-card"><div class="val" id="r-correct" style="color:var(--green)"></div><div class="lbl">答對題數</div></div>
    <div class="result-card"><div class="val" id="r-wrong" style="color:var(--red)"></div><div class="lbl">答錯題數</div></div>
    <div class="result-card"><div class="val" id="r-skip" style="color:var(--gold)"></div><div class="lbl">跳過題數</div></div>
    <div class="result-card"><div class="val" id="r-acc" style="color:var(--accent)"></div><div class="lbl">答題正確率</div></div>
  </div>
  <button class="btn-retry" onclick="startQuiz()">重新測驗</button>
  <button class="btn-review" onclick="showReview()">查看解析</button>
</div>

<!-- REVIEW -->
<div id="screen-review">
  <h2 style="font-size:22px;margin-bottom:24px;text-align:center;">答題解析</h2>
  <div id="review-list"></div>
  <div class="review-back">
    <button class="btn-retry" onclick="showResult()">返回結果</button>
    <button class="btn-retry" style="background:linear-gradient(135deg,#3ecf8e,#2ab97a);" onclick="startQuiz()">重新測驗</button>
  </div>
</div>

</main>

<script>
// ──────────────────────────────────────────────
// RAW QUESTION DATA
// correctIndex = 0-based index in original option array
// ──────────────────────────────────────────────
const RAW_QUESTIONS = [
  {
    id:1, part:1, score:1.5,
    q:"面對風險問題的態度，下列何者錯誤？",
    options:["主管責任大於部屬","使用最高且相同的單一行為標準，看待所有員工與主管","不可忽略組織成員的權責差異","宜區分出資的所有者與被雇用的員工"],
    correct:1
  },
  {
    id:2, part:1, score:1.5,
    q:"有關間接成本的會計科目與分攤，下列敘述何者錯誤？",
    options:["按照對象的分擔能力做分攤，係遵循「能力原則」","按照對象的成本收益關係做分攤，係採用「受益原則」","直接材料與直接人工屬於間接成本，須按照產品量做分攤","營業費用屬於間接成本，應按照「提供服務最多、接受服務最少」原則分攤至各部門"],
    correct:2
  },
  {
    id:3, part:1, score:1.5,
    q:"銀行分行（營業單位）主要的收入來源，不包括下列何者？",
    options:["調撥資金產生之財務投資收入","手續費收入","承作授信業務的放款利息收入","供應多餘內部資金時，按照供應利率賺取的利息收入"],
    correct:0
  },
  {
    id:4, part:1, score:1.5,
    q:"下列何者不屬於「責任中心體系」的分類要素？",
    options:["區域中心","成本（費用）中心","利潤中心","投資中心"],
    correct:0
  },
  {
    id:5, part:1, score:1.5,
    q:"財富管理處的處長，每個月領取的薪資費用應如何歸屬？",
    options:["此薪資費用是轄下理財等四個部門的間接成本","此薪資費用是財富管理處的間接成本","此薪資費用是轄下理財等四個部門的直接成本","此薪資費用不宜當作轄下任何部門的直接成本或間接成本"],
    correct:0
  },
  {
    id:6, part:1, score:1.5,
    q:"市場利率變動，導致資產負債之經濟價值跟著變動的風險，係稱為下列何種風險？",
    options:["再投資風險","再融資風險","市場價值風險","信用風險"],
    correct:2
  },
  {
    id:7, part:1, score:1.5,
    q:"美國的儲蓄貸款機構於 1980 年代出現倒閉風潮，係受到下列何種風險威脅金融機構的例證？",
    options:["國家風險","再融資風險","再投資風險","市場價值風險"],
    correct:1
  },
  {
    id:8, part:1, score:1.5,
    q:"有關市場風險的特性，下列敘述何者錯誤？",
    options:["個別市場風險反映金融工具產生的價格波動","一般市場風險反映總體經濟產生的價格波動","外匯由各國央行發行，因此外匯無個別市場風險，毋須計提此類風險的資本需求額，只計提一般市場風險的資本需求額","石油、貴金屬的價格波動風險，係由個別市場風險及一般市場風險構成"],
    correct:3
  },
  {
    id:9, part:1, score:1.5,
    q:"有關企業信用地位下滑之徵兆，下列敘述何者錯誤？",
    options:["企業發行新債務憑證需訂定比較高的票面利率","市場對企業流通在外的股票，長期看跌其價格","信用評等機構調降該企業發行之債務憑證","企業之利息保障倍數呈現提高情況"],
    correct:3
  },
  {
    id:10, part:1, score:1.5,
    q:"銀行辦理有追索權的應收帳款融資業務，授信對象為何？",
    options:["商品勞務的買方","商品勞務的賣方或應收帳款讓與者","承作該業務的銀行","應收帳款管理商"],
    correct:1
  },
  {
    id:11, part:1, score:1.5,
    q:"有關企業貸款的利率水準，下列敘述何者錯誤？",
    options:["信用等級佳的企業，信用等級加碼低","基準利率通常決定於信用市場的寬鬆與緊俏","基準利率旨在反映短期資金市場的走勢，概由個別銀行所主導","就相同借戶而言，擔保貸款利率通常低於信用貸款利率"],

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let questions = [];       // shuffled questions with shuffled options
let currentIdx = 0;
let answered = false;
let results = [];         // {q, userOptIdx (in shuffled), correct (in shuffled), skipped}
let totalScore = 0;

const labels = ['①','②','③','④'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepareQuestions() {
  const shuffledRaw = shuffle(RAW_QUESTIONS);
  questions = shuffledRaw.map(raw => {
    // shuffle options, track new correct index
    const indexed = raw.options.map((text, i) => ({ text, origIdx: i }));
    const shuffledOpts = shuffle(indexed);
    const newCorrect = shuffledOpts.findIndex(o => o.origIdx === raw.correct);
    return {
      ...raw,
      shuffledOptions: shuffledOpts.map(o => o.text),
      shuffledCorrect: newCorrect
    };
  });
}

function startQuiz() {
  prepareQuestions();
  currentIdx = 0;
  results = [];
  totalScore = 0;
  answered = false;
  document.getElementById('screen-intro').style.display = 'none';
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-review').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  document.getElementById('h-qnum').textContent = '—';
  document.getElementById('h-score').textContent = '0';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentIdx];
  const n = currentIdx + 1;

  // header
  document.getElementById('h-qnum').textContent = n;
  document.getElementById('progress-bar').style.width = ((n - 1) / 60 * 100) + '%';

  // meta
  document.getElementById('q-num-label').textContent = `題目 ${n} / 60`;
  const isP2 = q.part === 2;
  document.getElementById('q-part-tag').textContent = isP2 ? '第二部分' : '第一部分';
  document.getElementById('q-part-tag').className = 'q-part-tag ' + (isP2 ? 'part2' : 'part1');
  document.getElementById('q-score-tag').textContent = `每題 ${q.score} 分`;

  // question text
  document.getElementById('q-card').innerHTML = q.q;

  // options
  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  q.shuffledOptions.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.style.animationDelay = (0.05 + i * 0.05) + 's';
    btn.innerHTML = `<span class="opt-circle">${labels[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(i);
    wrap.appendChild(btn);
  });

  // feedback + next
  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  fb.textContent = '';
  document.getElementById('btn-next').classList.remove('show');
}

function selectOption(chosenIdx) {
  if (answered) return;
  answered = true;
  const q = questions[currentIdx];
  const correct = q.shuffledCorrect;
  const isCorrect = chosenIdx === correct;

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    else if (i === chosenIdx && !isCorrect) btn.classList.add('wrong');
    btn.querySelector('.opt-circle').textContent = labels[i];
    if (i === correct) btn.querySelector('.opt-circle').textContent = '✓';
    else if (i === chosenIdx && !isCorrect) btn.querySelector('.opt-circle').textContent = '✗';
  });

  results.push({ q, userOptIdx: chosenIdx, correct, skipped: false });
  if (isCorrect) {
    totalScore += q.score;
    document.getElementById('h-score').textContent = totalScore.toFixed(1);
  }

  const fb = document.getElementById('feedback-box');
  if (isCorrect) {
    fb.className = 'feedback-box feedback-correct show';
    fb.innerHTML = `✓ 答對了！正確答案為 ${labels[correct]}：${q.shuffledOptions[correct]}`;
  } else {
    fb.className = 'feedback-box feedback-wrong show';
    fb.innerHTML = `✗ 答錯了。正確答案為 ${labels[correct]}：${q.shuffledOptions[correct]}`;
  }

  document.getElementById('btn-next').classList.add('show');
}

function skipQuestion() {
  if (answered) { nextQuestion(); return; }
  const q = questions[currentIdx];
  results.push({ q, userOptIdx: -1, correct: q.shuffledCorrect, skipped: true });
  nextQuestion();
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= 60) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-result').style.display = 'block';

  const correct = results.filter(r => !r.skipped && r.userOptIdx === r.correct).length;
  const wrong = results.filter(r => !r.skipped && r.userOptIdx !== r.correct).length;
  const skipped = results.filter(r => r.skipped).length;
  const answered = correct + wrong;
  const acc = answered > 0 ? Math.round(correct / answered * 100) : 0;
  const score = parseFloat(totalScore.toFixed(1));
  const pass = score >= 60;

  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('h-qnum').textContent = '60';

  const circle = document.getElementById('result-circle');
  circle.className = 'result-circle ' + (pass ? 'pass' : 'fail');
  document.getElementById('result-score').textContent = score;
  document.getElementById('result-title').textContent = pass ? '🎉 恭喜通過！' : '繼續加油！';
  document.getElementById('result-sub').textContent = pass
    ? '您已達到及格標準，風險管理基本能力通過。'
    : '未達及格分數（60分），建議再次練習。';
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-skip').textContent = skipped;
  document.getElementById('r-acc').textContent = acc + '%';
}

function showReview() {
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-review').style.display = 'block';

  const list = document.getElementById('review-list');
  list.innerHTML = '';

  results.forEach((r, i) => {
    const { q, userOptIdx, correct, skipped } = r;
    const isCorrect = !skipped && userOptIdx === correct;
    const div = document.createElement('div');
    div.className = 'review-item';

    const status = skipped ? '⊘ 跳過' : (isCorrect ? '✓ 答對' : '✗ 答錯');
    const badgeCls = isCorrect ? 'ok' : 'no';

    let optsHtml = '';
    q.shuffledOptions.forEach((opt, oi) => {
      let cls = 'neutral';
      let mark = labels[oi];
      if (oi === correct) { cls = 'correct-ans'; mark = '✓'; }
      if (!skipped && oi === userOptIdx && oi !== correct) { cls = 'user-wrong'; mark = '✗'; }
      optsHtml += `<div class="opt-line ${cls}"><span>${mark}</span><span>${opt}</span></div>`;
    });

    div.innerHTML = `
      <div class="r-header">
        <span style="color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:12px;">No.${i+1} / 原題${q.id}</span>
        <span class="r-correct-badge ${badgeCls}">${status}</span>
        <span style="margin-left:auto;color:var(--text3);font-size:12px;">${q.score} 分</span>
      </div>
      <div class="review-q">${q.q}</div>
      <div class="review-opts">${optsHtml}</div>
    `;
    list.appendChild(div);
  });
}

function showResult() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-result').style.display = 'block';

  const correct = results.filter(r => !r.skipped && r.userOptIdx === r.correct).length;
  const wrong = results.filter(r => !r.skipped && r.userOptIdx !== r.correct).length;
  const skipped = results.filter(r => r.skipped).length;
  const answeredCount = correct + wrong;
  const acc = answeredCount > 0 ? Math.round(correct / answeredCount * 100) : 0;
  const score = parseFloat(totalScore.toFixed(1));
  const pass = score >= 60;

  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('h-qnum').textContent = '60';

  const circle = document.getElementById('result-circle');
  circle.className = 'result-circle ' + (pass ? 'pass' : 'fail');
  document.getElementById('result-score').textContent = score;
  document.getElementById('result-title').textContent = pass ? '🎉 恭喜通過！' : '繼續加油！';
  document.getElementById('result-sub').textContent = pass
    ? '您已達到及格標準，風險管理基本能力通過。'
    : '未達及格分數（60分），建議再次練習。';
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-skip').textContent = skipped;
  document.getElementById('r-acc').textContent = acc + '%';
}
</script>
